name: Automate Unfollow Non-Reciprocal X.com Accounts

on:
  schedule:
    # Run every 8 hours (same as GitHub unfollow bot)
    - cron: "0 0/8 * * *"
  workflow_dispatch: # Allows manual runs from GitHub Actions UI

jobs:
  unfollow-x-non-reciprocal:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install Chromium for Puppeteer
      - name: Install Chromium
        run: sudo apt-get install -y chromium-browser

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          npm install puppeteer-core dotenv
          npm install puppeteer --ignore-scripts

      # Step 5: Run the X.com Unfollow Script
      - name: Run X.com Unfollow Script
        env:
          X_SCREEN_NAME: ${{ secrets.X_SCREEN_NAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          EXCLUDED_USERS: ${{ secrets.X_EXCLUDED_USERS }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: node unfollow-x.js
